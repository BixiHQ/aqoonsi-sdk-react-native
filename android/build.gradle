buildscript {
  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath("com.android.tools.build:gradle:8.1.1")
  }
}

apply plugin: "com.android.library"

def getExtOrDefault(name, defaultValue) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : defaultValue
}

android {
  namespace "com.aqoonsi.facetec"
  compileSdkVersion getExtOrDefault("compileSdkVersion", 34)

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion", 24)
    targetSdkVersion getExtOrDefault("targetSdkVersion", 34)
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_11
    targetCompatibility JavaVersion.VERSION_11
  }

  sourceSets {
    main {
      java.srcDirs = ["src/main/java"]
    }
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-native:+"
  api files("libs/facetec-sdk-10.0.35.aar")
}
